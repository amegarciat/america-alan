.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(10,5,2,0.4) 0%,rgba(10,5,2,0.92) 100%);
  z-index:1;
}
.hero-content{position:relative;z-index:2;width:100%;max-width:480px;}

/* BADGE */
.badge{
  display:inline-block;
  font-size:10px;font-weight:500;letter-spacing:0.28em;
  text-transform:uppercase;color:var(--terra);
  border:0.5px solid rgba(200,147,106,0.4);
  padding:6px 18px;border-radius:99px;
  margin-bottom:24px;
  background:rgba(200,147,106,0.06);
}

/* NAMES */
.names{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(52px,14vw,72px);
  font-weight:300;color:#fff;
  line-height:0.95;
  margin-bottom:8px;
  text-shadow:0 4px 30px rgba(0,0,0,0.8);
}
.names em{font-style:italic;color:var(--terra);}
.names .amp{font-style:normal;font-size:0.65em;color:rgba(255,255,255,0.4);}

/* DATE LINE */
.date-line{
  display:flex;align-items:center;justify-content:center;gap:12px;
  margin:20px 0 40px;
}
.date-line span{font-size:11px;font-weight:300;letter-spacing:0.18em;color:rgba(255,255,255,0.55);text-transform:uppercase;}
.date-line::before,.date-line::after{content:'';flex:1;max-width:60px;height:1px;background:linear-gradient(to right,transparent,rgba(200,147,106,0.4));}
.date-line::after{background:linear-gradient(to left,transparent,rgba(200,147,106,0.4));}

/* CARDS */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;margin-bottom:32px;}
.card{
  border-radius:16px;overflow:hidden;
  cursor:pointer;
  text-decoration:none;
  display:block;
  transition:transform 0.2s ease;
  border:0.5px solid rgba(200,147,106,0.2);
}
.card:hover{transform:translateY(-3px);}
.card-img{
  height:140px;
  position:relative;overflow:hidden;
}
.card-img img{
  width:100%;height:100%;
  object-fit:cover;
  filter:brightness(0.45);
  transition:transform 0.3s ease;
}
.card:hover .card-img img{transform:scale(1.04);}
.card-img-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 20%,rgba(20,10,5,0.85) 100%);
}
.card-icon{
  position:absolute;top:14px;right:14px;
  font-size:22px;
  filter:drop-shadow(0 1px 4px rgba(0,0,0,0.6));
}
.card-body{
  background:rgba(46,34,26,0.95);
  padding:14px 16px;
}
.card-label{
  font-size:9px;font-weight:500;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--terra);
  margin-bottom:4px;
}
.card-title{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:400;
  color:#fff;margin-bottom:4px;
}
.card-sub{
  font-size:10px;color:rgba(255,255,255,0.45);
  font-weight:300;
}
.card-btn{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:10px;
  font-size:10px;font-weight:500;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--terra);
}
.card-btn::after{content:'→';font-size:13px;}

/* VENUE */
.venue-line{
  font-size:11px;font-weight:300;letter-spacing:0.14em;
  color:rgba(255,255,255,0.35);text-transform:uppercase;
}
.venue-line strong{color:rgba(255,255,255,0.55);font-weight:400;}

/* DECORATIVE DOTS */
.footer-dots{
  display:flex;justify-content:center;gap:6px;margin-top:20px;
}
.ft-dot{width:5px;height:5px;border-radius:50%;}
</style>
